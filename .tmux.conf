set -g default-terminal "xterm-256color"

# https://qiita.com/k2nakamura/items/fa19806a041d0429fc9f
set -s escape-time 0

# set-option -g prefix 'C-\'
set-option -g prefix 'C-q'
unbind C-b

bind k select-pane -U 
bind j select-pane -D 
bind h select-pane -L 
bind l select-pane -R
# ↓リピートする場合は-rをつける
# bind -r k select-pane -U 
# bind -r j select-pane -D 
# bind -r h select-pane -L 
# bind -r l select-pane -R

# ウィンドウのインデックスを1から始める
set -g base-index 1

# 非アクティブペインの背景色変更
# ref: https://qiita.com/mnishiguchi/items/210453c5778769df369a
# set -g window-style 'bg=#303030'
# set -g window-style 'fg=colour244,bg=colour234'
set -g window-style 'fg=white,bg=colour234'
# アクティブなペイン
#set -g window-active-style 'bg=#000000'
set -g window-active-style 'fg=white,bg=black'


# カラーテーマ
# Nightfox colors for Tmux
# Style: terafox
# Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/terafox/nightfox_tmux.tmux
set -g mode-style "fg=#5a93aa,bg=#cbd9d8"
set -g message-style "fg=#5a93aa,bg=#cbd9d8"
set -g message-command-style "fg=#5a93aa,bg=#cbd9d8"
set -g pane-border-style "fg=#304b4b"
set -g pane-border-lines heavy
set -g pane-active-border-style "fg=#ff0000,bold"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#ff0000,bold] ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ #[default],#[fg=#304b4b] ─────────────────────────────────── #[default]}"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#5a93aa,bg=#0f1c1e"
set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE
set -g status-left "#[fg=#2f3239,bg=#5a93aa,bold] #S #[fg=#5a93aa,bg=#0f1c1e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#0f1c1e,bg=#0f1c1e,nobold,nounderscore,noitalics]#[fg=#5a93aa,bg=#0f1c1e] #{prefix_highlight} #[fg=#cbd9d8,bg=#0f1c1e,nobold,nounderscore,noitalics]#[fg=#5a93aa,bg=#cbd9d8] %Y-%m-%d  %I:%M %p #[fg=#5a93aa,bg=#cbd9d8,nobold,nounderscore,noitalics]#[fg=#2f3239,bg=#5a93aa,bold] #h "
set -g status-format[1] "#[bg=#ff0000]#(printf '%*s' #{client_width} '')#[default]"
setw -g window-status-activity-style "underscore,fg=#587b7b,bg=#0f1c1e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#587b7b,bg=#0f1c1e"
setw -g window-status-format "#[fg=#0f1c1e,bg=#0f1c1e,nobold,nounderscore,noitalics]#[default] #I  #W #[fg=#587b7b] #{b:pane_current_path} #[default]#F #[fg=#0f1c1e,bg=#0f1c1e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#0f1c1e,bg=#cbd9d8,nobold,nounderscore,noitalics]#[fg=#5a93aa,bg=#cbd9d8,bold] #I  #W #[fg=#5a93aa,bg=#cbd9d8] #{b:pane_current_path} #[fg=#5a93aa,bg=#cbd9d8]#F #[fg=#cbd9d8,bg=#0f1c1e,nobold,nounderscore,noitalics]"

# プラグインマネージャーtpmの設定
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm で事前に導入しておく
# prefix + I でインストール

set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-resurrect      \
'

run-shell '~/.tmux/plugins/tpm/tpm'
